# Shared variables for all hosts
batchalign_version: "0.8.0"  # Updated by CI/deploy
batchalign_config_dir: "{{ ansible_facts['user_dir'] }}/.batchalign3"
batchalign_port: 8001
default_lang: eng
job_ttl_days: 7

# NFS media mount point on clients
nfs_media_server: net
nfs_media_exports:
  - source: /Volumes/Net/TalkBank/media
    mount: /Volumes/TalkBank/media

# NFS data mount point on clients
nfs_data_exports:
  - source: /Volumes/Net/data
    mount: /Volumes/TalkBank/data

# Media mappings for NFS clients (non-Net compute servers)
client_media_mappings:
  english-data: /Volumes/TalkBank/data/english-data
  biling-data: /Volumes/TalkBank/data/biling-data
  clinical-data: /Volumes/TalkBank/data/clinical-data
  other-data: /Volumes/TalkBank/data/other-data

# Internal batchalign3 server fleet for generated fleet.yaml.
fleet_servers:
  - { name: net, url: "http://net:8001" }

# Redis (on net only)
redis_host: net
redis_port: 6379
redis_maxmemory: 32gb

# Install batchalign3[serve] + batchalign-core via uv tool
---
- name: Copy batchalign3 wheel
  copy:
    src: "{{ batchalign3_wheel }}"
    dest: /tmp/batchalign3.whl
    mode: '0644'

- name: Copy batchalign-core wheel
  copy:
    src: "{{ batchalign_core_wheel }}"
    dest: /tmp/batchalign_core.whl
    mode: '0644'

- name: Stop existing server
  command: batchalign3 serve stop
  ignore_errors: true

- name: Uninstall old versions
  command: uv tool uninstall batchalign3
  ignore_errors: true

- name: Install batchalign3 with serve extra
  command: >
    uv tool install --python {{ python_version }} --force-reinstall
    /tmp/batchalign3.whl
    --with /tmp/batchalign_core.whl

- name: Verify installation
  command: batchalign3 --help
  changed_when: false

- name: Clean up wheel files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/batchalign3.whl
    - /tmp/batchalign_core.whl

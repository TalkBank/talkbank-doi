# Install the monolithic batchalign3 wheel via uv tool.
---
- name: Copy batchalign3 wheel
  copy:
    src: "{{ batchalign3_wheel }}"
    dest: "/tmp/{{ batchalign3_wheel | basename }}"
    mode: '0644'

- name: Install batchalign3
  command: >
    uv tool install --python {{ python_version }} --force-reinstall
    /tmp/{{ batchalign3_wheel | basename }}

- name: Verify installation
  command: batchalign3 --help
  changed_when: false

- name: Clean up wheel files
  file:
    path: "/tmp/{{ batchalign3_wheel | basename }}"
    state: absent

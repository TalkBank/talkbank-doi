# Configure and start batchalign3 server
---
- name: Ensure config directory exists
  file:
    path: "{{ batchalign_config_dir }}"
    state: directory
    mode: '0755'

- name: Deploy server.yaml
  template:
    src: server.yaml.j2
    dest: "{{ batchalign_config_dir }}/server.yaml"
    mode: '0644'

- name: Deploy fleet.yaml
  template:
    src: fleet.yaml.j2
    dest: "{{ batchalign_config_dir }}/fleet.yaml"
    mode: '0644'

- name: Restart batchalign server
  shell: batchalign3 serve stop || true; sleep 2; batchalign3 serve start
  changed_when: true

- name: Wait for server to be healthy
  uri:
    url: "http://localhost:{{ batchalign_port }}/health"
    method: GET
    return_content: true
    status_code: [200]
  register: health
  until: health.status == 200
  retries: 36
  delay: 5
  failed_when: false
  # 36 * 5 = 180 seconds max wait (model warmup)

- name: Fail if server never became healthy
  fail:
    msg: "batchalign3 server did not respond to /health after 180s"
  when: health.status | default(0) != 200

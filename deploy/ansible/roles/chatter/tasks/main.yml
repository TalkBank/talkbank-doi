# Install the chatter CLI binary on macOS hosts.
---
- name: Ensure ~/bin exists
  file:
    path: "{{ ansible_env.HOME }}/bin"
    state: directory
    mode: '0755'

- name: Copy chatter binary
  copy:
    src: "{{ chatter_binary }}"
    dest: "{{ ansible_env.HOME }}/bin/chatter"
    mode: '0755'

- name: Ad-hoc codesign the binary
  command: "codesign -s - {{ ansible_env.HOME }}/bin/chatter"

- name: Verify installation
  command: "{{ ansible_env.HOME }}/bin/chatter --help"
  changed_when: false

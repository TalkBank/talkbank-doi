# Ansible configuration for TalkBank fleet management
#
# All machines are on the same Tailscale tailnet.
# SSH transport uses Tailscale hostnames (not IPs).

[defaults]
inventory = inventory.yml
roles_path = roles
remote_user = macw
host_key_checking = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 86400

[ssh_connection]
pipelining = True
ssh_args = -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new

# Batchalign fleet configuration.
#
# Install to ~/.batchalign3/fleet.yaml on each client machine.
# When present, the CLI auto-discovers all fleet servers and distributes
# files across them proportional to each server's available workers.
#
# Each server must be running `batchalign3 serve start`.
# The CLI queries GET /health on each server to check availability and
# reports its capabilities (which commands it can handle).

servers:
  # Primary server (large machine, high capacity)
  - name: primary
    url: http://server-a:8000

  # Secondary server
  - name: secondary
    url: http://server-b:8000

  # Additional servers can be added as needed:
  # - name: gpu-box
  #   url: http://server-c:8000
